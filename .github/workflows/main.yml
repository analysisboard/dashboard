name: Stock Data Update

on:
  schedule:
    - cron: '0 0 * * 6' # 토요일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 버전을 3.11로 업그레이드

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 라이브러리들을 개별적으로 설치하여 오류 발생 지점을 명확히 합니다.
          pip install yfinance pandas openpyxl
          # pandas-ta는 최신 pandas와의 호환성을 위해 아래 경로로 직접 설치합니다.
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run analysis
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 생성된 파일들을 강제로 추가합니다.
          git add stock_analysis.json || echo "No files to add"
          # 변경사항이 있는 경우에만 커밋합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
