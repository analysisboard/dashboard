name: Stock Data Update

on:
  schedule:
    - cron: '0 23 * * 5' # 매주 토요일 오전 9시 (KST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # 패키지 설치 에러 발생 시 '3.12'로 변경 고려
          cache: 'pip' # 패키지 다운로드 캐싱 적용 (속도 향상)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 로컬과 동일한 구성. 향후에는 requirements.txt 사용을 권장합니다.
          pip install yfinance pandas pandas-ta openpyxl

      - name: Run analysis
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경된 파일만 add 하도록 처리
          git add stock_analysis.json
          
          # TZ=Asia/Seoul을 적용하여 한국 시간 기준으로 커밋 메시지 작성
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')" && git push)
