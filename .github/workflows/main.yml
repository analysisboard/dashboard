name: Stock Data Update

on:
  schedule:
    # 한국 시간(KST) 매주 토요일 오전 9시 = UTC 금요일 밤 12시
    - cron: '0 0 * * 6'
  workflow_dispatch: # 수동 실행 버튼 활성화

# 파일 쓰기 권한을 명시적으로 부여 (Permission Error 방지)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 최신 버전으로 업데이트 (Node.js 경고 해결)

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전으로 업데이트
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pandas-ta의 설치 호환성을 위해 직접 설치를 권장합니다.
          pip install yfinance pandas openpyxl
          pip install pandas-ta

      - name: Run analysis
        # python 단어 중복 제거 및 실제 파일명(tck_analysis_github.py) 적용
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 새로 생성된 json 및 xlsx 파일을 스테이징에 추가
          git add stock_analysis.json
          # 변경 사항이 있는 경우에만 커밋 및 푸시 (에러 방지)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
